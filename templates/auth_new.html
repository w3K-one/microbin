{% include "header.html" %}

<div id="auth-wrap">
  <div id="auth-card">
    <div id="auth-header">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5b8af0" fill-opacity="0.15"/>
        <path d="M12 2C9.24 2 7 4.24 7 7v1H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-1V7c0-2.76-2.24-5-5-5zm0 2c1.66 0 3 1.34 3 3v1H9V7c0-1.66 1.34-3 3-3zm0 9a2 2 0 1 1 0 4 2 2 0 0 1 0-4z" fill="#5b8af0"/>
      </svg>
      <h2>New Paste</h2>
      <p>w3K MicroBin</p>
    </div>

    <form id="auth-form" method="POST" action="{{ args.public_path_as_str() }}/auth/new">
      <div class="field">
        <label for="password-field">Password</label>
        <input id="password-field" placeholder="Uploader password" type="password" autocomplete="current-password" name="password" autofocus>
      </div>
      {% if status == "incorrect" %}
      <div id="auth-error">Incorrect password.</div>
      {% endif %}
      <button type="submit">Continue</button>
    </form>
  </div>
</div>

{% include "footer.html" %}

<style>
#auth-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
  padding: 2rem 0;
}

#auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2.5rem 2.25rem;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
}

#auth-header {
  text-align: center;
  margin-bottom: 2rem;
}

#auth-header svg {
  margin: 0 auto 0.75rem;
  display: block;
}

#auth-header h2 {
  font-size: 1.3rem;
  font-weight: 700;
  margin: 0 0 0.25rem;
  color: var(--text);
}

#auth-header p {
  font-size: 0.82rem;
  color: var(--dim);
  margin: 0;
}

.field {
  margin-bottom: 1rem;
}

.field label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--dim);
  margin-bottom: 0.35rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field input {
  width: 100%;
  padding: 0.55rem 0.8rem;
  font-size: 0.92rem;
}

#auth-form button {
  width: 100%;
  padding: 0.6rem;
  font-size: 0.9rem;
  margin-top: 0.5rem;
  border-radius: 8px;
  letter-spacing: 0.02em;
}

#auth-error {
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 6px;
  color: #fca5a5;
  font-size: 0.82rem;
  padding: 0.5rem 0.75rem;
  margin-bottom: 0.75rem;
}
</style>
